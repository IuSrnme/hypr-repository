# ============================================================
# hyprland.conf — sanny
# ============================================================

# Remove autogenerated warning
autogenerated = 0

################
### MONITORS ###
################

monitor = ,preferred,auto,auto

###################
### MY PROGRAMS ###
###################

$terminal    = ghostty
$menu        = rofi -show drun
$filemanager = yazi

#################
### AUTOSTART ###
#################

exec-once = swww-daemon
exec-once = waybar
exec-once = dunst
exec-once = fcitx5 -d
exec-once = hyprpolkitagent
exec-once = wl-paste --type text --watch cliphist store
exec-once = firefox
exec-once = discord

# Scratchpad apps — launch hidden, toggle with keybind
exec-once = ghostty --title scratchpad
exec-once = obsidian

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in  = 5
    gaps_out = 8

    border_size = 2

    # Note: Replace with Monogatari Warning Red palette in Phase 3
    col.active_border   = rgba(E94B67ff)   # Placeholder red
    col.inactive_border = rgba(2d2d2daa)   # Dark gray
    
    resize_on_border = true

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 0

    active_opacity   = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

animations {
    enabled = yes

    bezier = linear, 0, 0, 1, 1
    bezier = snap,   0.15, 0, 0.1, 1

    animation = windows,    1, 3, snap,   popin 80%
    animation = border,     1, 3, linear
    animation = fade,       1, 2, linear
    animation = workspaces, 1, 3, snap,   fade
}

dwindle {
    pseudotile    = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
}

#############
### INPUT ###
#############

input {
    kb_layout = latam
    kb_variant = 
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity  = 0		# -1.0 to 1.0 = no modification
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# --- Apps ---
bind = $mainMod,       Q,     exec,          $terminal
bind = $mainMod,       C,     killactive,
bind = $mainMod,       R,     exec,          $menu
bind = $mainMod,       F,     fullscreen,    0
bind = $mainMod SHIFT, Space, togglefloating,
bind = $mainMod SHIFT, R,     exec,          hyprctl reload
bind = $mainMod,       M,     exit,

# --- Scratchpads ---
bind = $mainMod,       minus, togglespecialworkspace, scratchpad
bind = $mainMod,       N,     togglespecialworkspace, obsidian

# --- Clipboard ---
bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# --- Screenshots ---
bind = , Print,       exec, grim ~/Pictures/Screenshots/$(date +%Y-%m-%d-%T).png
bind = SHIFT, Print,  exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y-%m-%d-%T).png

# --- Focus ---
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, Tab,   cyclenext,

# --- Move Windows ---
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# --- Workspaces ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# --- Mouse Workspace Scroll ---
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# --- Move/Resize with Mouse ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Volume ---
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# --- Brightness (ddcutil — external monitor) ---
bind = $mainMod, F1, exec, ddcutil setvcp 10 + 10
bind = $mainMod, F2, exec, ddcutil setvcp 10 - 10

# --- Media ---
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause

# --- Dwindle ---
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit

##############################
### WINDOWS AND WORKSPACES ###
##############################

# --- Scratchpad Rules ---
windowrule {
    name  = scratchpad-terminal
    match:title = scratchpad
    workspace = special:scratchpad silent
    float     = yes
    size      = 800 500
    center    = yes
}

windowrule {
    name  = obsidian-scratchpad
    match:class = obsidian
    workspace = special:obsidian silent
    float     = yes
    size      = 1200 800
    center    = yes
}

# --- Workspace Assignments ---
windowrule {
    name  = firefox-workspace
    match:class = firefox
    workspace = 2
}

windowrule {
    name  = discord-workspace
    match:class = discord
    workspace = 3
}

# --- General Rules ---
windowrule {
    name        = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name           = fix-xwayland-drags
    match:class    = ^$
    match:title    = ^$
    match:xwayland = true
    match:float    = true
    match:fullscreen = false
    match:pin      = false
    no_focus       = true
}
